<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>考研复习全年计划</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-soft: #f1f5f9;
      --text: #172033;
      --muted: #64748b;
      --line: #dfe4ea;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #0f9f7a;
      --green-soft: #dff7ef;
      --amber: #c47a10;
      --amber-soft: #fff2d8;
      --red: #c44524;
      --red-soft: #fde9e1;
      --pink: #b62b61;
      --pink-soft: #fde7ef;
      --purple: #6f5bdc;
      --purple-soft: #eeedff;
      --control-bg: #ffffff;
      --control-text: #172033;
      --bg-image: none;
      --bg-overlay-rgb: 247, 248, 250;
      --bg-mask: 0.82;
      --bg-size: cover;
      --bg-position-x: 50%;
      --bg-position-y: 50%;
      --panel-glass: rgba(255, 255, 255, 0.86);
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    body[data-theme="forest"] {
      --bg: #eef7f1;
      --panel-soft: #e7f1ea;
      --blue: #256f5b;
      --blue-soft: #dff1e8;
      --green: #14825f;
      --green-soft: #dff7ec;
      --amber: #a16207;
      --amber-soft: #fff4d6;
      --red: #b9462f;
      --red-soft: #fde8df;
      --pink: #a63b68;
      --pink-soft: #f8e2ec;
      --purple: #64748b;
      --purple-soft: #e8edf3;
      --bg-overlay-rgb: 238, 247, 241;
    }

    body[data-theme="sunrise"] {
      --bg: #fff8ee;
      --panel-soft: #f8efe2;
      --blue: #b85f12;
      --blue-soft: #ffedd5;
      --green: #177e72;
      --green-soft: #dff7f0;
      --amber: #c46a0a;
      --amber-soft: #fff0cf;
      --red: #c24135;
      --red-soft: #fde7df;
      --pink: #b03060;
      --pink-soft: #fbe2ec;
      --purple: #7856b8;
      --purple-soft: #efe8fb;
      --bg-overlay-rgb: 255, 248, 238;
    }

    body[data-theme="ocean"] {
      --bg: #eef8fb;
      --panel-soft: #e6f2f6;
      --blue: #0b78b6;
      --blue-soft: #d8f0ff;
      --green: #088072;
      --green-soft: #d8f4ee;
      --amber: #a56b0b;
      --amber-soft: #fff1d0;
      --red: #bb3e31;
      --red-soft: #fde5df;
      --pink: #9d3472;
      --pink-soft: #f8e1ef;
      --purple: #4f64b5;
      --purple-soft: #e6ebff;
      --bg-overlay-rgb: 238, 248, 251;
    }

    body[data-theme="berry"] {
      --bg: #fbf4f8;
      --panel-soft: #f5eaf1;
      --blue: #8b3fb2;
      --blue-soft: #f1e1fb;
      --green: #237a69;
      --green-soft: #dff4ef;
      --amber: #9d6a08;
      --amber-soft: #fff0cc;
      --red: #b73a48;
      --red-soft: #fde2e7;
      --pink: #b72f71;
      --pink-soft: #fbe0ee;
      --purple: #7c3fb0;
      --purple-soft: #f1e5fb;
      --bg-overlay-rgb: 251, 244, 248;
    }

    body[data-theme="mint"] {
      --bg: #f0faf8;
      --panel-soft: #e4f3f0;
      --blue: #167a95;
      --blue-soft: #d9f0f6;
      --green: #0d8b78;
      --green-soft: #d9f6ef;
      --amber: #9c740c;
      --amber-soft: #fff5cf;
      --red: #b64a35;
      --red-soft: #fde8df;
      --pink: #9c3a73;
      --pink-soft: #f7e2ef;
      --purple: #5f64b8;
      --purple-soft: #e9ebff;
      --bg-overlay-rgb: 240, 250, 248;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      background-image: linear-gradient(rgba(var(--bg-overlay-rgb), var(--bg-mask)), rgba(var(--bg-overlay-rgb), var(--bg-mask))), var(--bg-image);
      background-size: auto, var(--bg-size);
      background-position: center, var(--bg-position-x) var(--bg-position-y);
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.55;
    }

    body.has-bg .panel,
    body.has-bg .appearance-panel {
      background: var(--panel-glass);
      backdrop-filter: blur(14px);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 24px 52px;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .title-wrap {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stage-toggle {
      display: none;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--control-bg);
      color: #334155;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: #cbd5e1;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.1);
    }

    .layout-btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--control-bg);
      color: #334155;
      padding: 0 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .layout-reset {
      display: none;
    }

    body.layout-editing .layout-reset {
      display: inline-flex;
      align-items: center;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .appearance-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto auto;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }

    .appearance-title {
      color: #334155;
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }

    .theme-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .theme-swatch {
      width: 34px;
      height: 34px;
      border: 2px solid transparent;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.14);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .theme-swatch:hover {
      transform: translateY(-1px);
    }

    .theme-swatch.active {
      border-color: var(--blue);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border-radius: 6px;
      padding: 0 14px;
      background: #eef2f7;
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .upload-btn input {
      display: none;
    }

    .bg-editor {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .bg-editor label {
      display: grid;
      gap: 6px;
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    .bg-editor input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .bg-editor select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: var(--control-bg);
      color: var(--control-text);
      padding: 7px 9px;
    }

    .bg-value {
      color: var(--muted);
      font-weight: 700;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 80;
      padding: 20px;
      background: rgba(15, 23, 42, 0.42);
    }

    .modal-backdrop.active {
      display: grid;
    }

    .modal {
      width: min(680px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      padding: 18px;
    }

    body.has-bg .modal {
      background: var(--panel-glass);
      backdrop-filter: blur(14px);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head strong {
      font-size: 18px;
      color: #172033;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }

    .module-zone {
      min-height: 24px;
      position: relative;
    }

    .module-zone.drag-over {
      outline: 2px dashed var(--blue);
      outline-offset: 4px;
      border-radius: 10px;
    }

    body.layout-editing .module-zone {
      padding: 30px 10px 10px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.36);
    }

    body.layout-editing .module-zone::before {
      content: attr(data-zone-label);
      position: absolute;
      left: 10px;
      top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
    }

    .module-card {
      transition: opacity 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .module-card.dragging {
      opacity: 0.55;
      transform: scale(0.99);
    }

    .module-handle {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      display: none;
      place-items: center;
      border-radius: 6px;
      background: #eef2f7;
      color: #475569;
      font-size: 15px;
      line-height: 1;
      cursor: grab;
    }

    body.layout-editing .module-handle {
      display: inline-grid;
    }

    .module-handle:active {
      cursor: grabbing;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 174px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      color: #334155;
      font-size: 15px;
      font-weight: 700;
    }

    .countdown {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .days {
      font-size: 52px;
      line-height: 0.9;
      font-weight: 800;
      color: var(--blue);
      font-variant-numeric: tabular-nums;
    }

    .unit {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 4px;
    }

    .date-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: auto;
    }

    .date-row input,
    .task-form input,
    .task-form select,
    .score-form input,
    .score-form select,
    .timer-select,
    .custom-timer input,
    .wrong-upload-form input,
    .wrong-upload-form select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: var(--control-bg);
      color: var(--control-text);
      padding: 9px 10px;
      min-height: 40px;
    }

    .primary-btn,
    .ghost-btn,
    .danger-btn {
      min-height: 40px;
      border-radius: 6px;
      padding: 0 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .primary-btn {
      background: var(--blue);
      color: #ffffff;
    }

    .ghost-btn {
      background: #eef2f7;
      color: #334155;
    }

    .danger-btn {
      background: var(--red-soft);
      color: var(--red);
    }

    .current-stage {
      display: grid;
      gap: 10px;
    }

    .stage-pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 800;
      font-size: 14px;
    }

    .stage-summary {
      margin: 0;
      color: #475569;
      font-size: 15px;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: auto;
    }

    .mini-stat {
      background: var(--panel-soft);
      border-radius: 6px;
      padding: 9px;
      min-height: 56px;
    }

    .mini-stat strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .mini-stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .timer {
      display: grid;
      gap: 12px;
    }

    .focus-panel .timer {
      margin-bottom: 14px;
    }

    .timer-face {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .timer-time {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .timer-controls,
    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .custom-timer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .preset-btn {
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef2f7;
      color: #334155;
      font-weight: 700;
      font-size: 13px;
    }

    .preset-btn.active {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .timeline {
      margin: 16px 0 24px;
    }

    .timeline-track {
      position: relative;
      padding-top: 38px;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 20% 33% 27% 15% 5%;
      background: #e5e7eb;
    }

    .seg:nth-child(1) { background: #a7a3f4; }
    .seg:nth-child(2) { background: #5ccdad; }
    .seg:nth-child(3) { background: #f4a021; }
    .seg:nth-child(4) { background: #df5831; }
    .seg:nth-child(5) { background: #d94b7b; }

    .months {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .timeline-marker {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 88px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .timeline-icon {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      display: grid;
      place-items: center;
      color: var(--blue);
      font-size: 20px;
      overflow: hidden;
    }

    .timeline-icon img {
      display: none;
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .timeline-icon.has-custom span {
      display: none;
    }

    .timeline-icon.has-custom img {
      display: block;
    }

    .timeline-marker-label {
      max-width: 118px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
    }

    .timeline-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }

    .main-stack {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .main-wide {
      display: grid;
      gap: 14px;
    }

    .stage-list {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .stage {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 26px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .stage.active {
      border-color: var(--blue);
      box-shadow: var(--shadow);
    }

    .stage:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .stage-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .stage-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .stage-name {
      font-size: 21px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tag {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .today-badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .date {
      color: #334155;
      font-size: 16px;
      white-space: nowrap;
    }

    .detail {
      display: none;
      padding-top: 20px;
      animation: fadeIn 0.2s ease;
    }

    .stage.active .detail {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .desc {
      margin: 0 0 18px;
      color: #475569;
      font-size: 16px;
    }

    .section-title {
      margin: 16px 0 10px;
      font-size: 15px;
      font-weight: 800;
      color: #334155;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .subject-card {
      background: #f6f3ec;
      border-radius: 8px;
      padding: 14px;
      min-height: 104px;
    }

    .subject-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .subject-card span {
      color: #475569;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th,
    td {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #334155;
      font-weight: 800;
    }

    td:first-child,
    th:first-child {
      width: 38%;
      color: #334155;
    }

    .tip {
      margin-top: 18px;
      background: var(--blue-soft);
      color: var(--blue);
      border-radius: 8px;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 14px;
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .progress-line {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e2e8f0;
      margin: 6px 0 12px;
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--green);
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .task-form {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    .task-list {
      display: grid;
      gap: 8px;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #ffffff;
    }

    .task-item input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--green);
    }

    .task-text {
      min-width: 0;
    }

    .task-text strong {
      display: inline-block;
      margin-right: 6px;
      font-size: 13px;
      color: var(--blue);
    }

    .task-text span {
      color: #334155;
      word-break: break-word;
    }

    .task-item.done span {
      color: #94a3b8;
      text-decoration: line-through;
    }

    .small-delete {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: #64748b;
      background: #f1f5f9;
      font-size: 18px;
      line-height: 1;
    }

    .wrong-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .wrong-upload-form {
      display: grid;
      gap: 8px;
    }

    .wrong-upload-main-form {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 10px;
    }

    .wrong-upload-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .wrong-preview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .wrong-preview-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .wrong-preview-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e2e8f0;
    }

    .wrong-preview-card span {
      display: block;
      padding: 7px 8px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border-radius: 6px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }

    .file-btn.secondary {
      background: #eef2f7;
      color: #334155;
    }

    .file-btn input {
      display: none;
    }

    .upload-hint {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .wrong-upload-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      max-height: 520px;
      overflow: auto;
      padding-right: 2px;
    }

    .wrong-upload-card {
      display: grid;
      grid-template-columns: auto 96px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
    }

    .wrong-select {
      width: 18px;
      height: 18px;
      margin-top: 4px;
      accent-color: var(--blue);
    }

    .wrong-thumb {
      width: 96px;
      height: 96px;
      border-radius: 6px;
      object-fit: cover;
      background: #e2e8f0;
    }

    .wrong-upload-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .wrong-upload-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .wrong-note {
      color: #475569;
      font-size: 13px;
      word-break: break-word;
    }

    .wrong-upload-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .wrong-bank-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .wrong-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .wrong-card strong {
      font-size: 14px;
      color: #334155;
    }

    .wrong-count {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .wrong-count span {
      font-size: 25px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .score-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .score-form .full {
      grid-column: 1 / -1;
    }

    .score-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .major-types-row {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .major-types-row.active {
      display: grid;
    }

    .score-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }

    .score-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .score-main {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
    }

    .score-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .focus-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .focus-stat-card {
      background: var(--panel-soft);
      border-radius: 6px;
      padding: 9px;
      min-height: 58px;
    }

    .focus-stat-card strong {
      display: block;
      font-size: 20px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .focus-stat-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .focus-subject-list,
    .focus-session-list {
      display: grid;
      gap: 8px;
    }

    .focus-chart {
      min-height: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      margin-bottom: 12px;
    }

    .focus-chart svg {
      display: block;
      width: 100%;
      height: 180px;
    }

    .focus-chart-empty {
      display: grid;
      place-items: center;
      min-height: 166px;
      color: var(--muted);
      font-size: 14px;
    }

    .focus-section-label {
      margin: 10px 0 8px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    .focus-subject-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 8px;
      color: #334155;
      font-size: 13px;
    }

    .focus-bar {
      height: 8px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .focus-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .focus-session-list {
      margin-top: 12px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .focus-session-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 9px 10px;
    }

    .focus-session-main {
      min-width: 0;
    }

    .focus-session-main strong {
      display: block;
      color: #334155;
      font-size: 14px;
    }

    .focus-session-main span {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }

    .floating {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      border: 1px solid #e2e8f0;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 28px;
      color: #475569;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .floating:hover {
      transform: translateX(-50%) translateY(-3px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
    }

    .purple { background: #a7a3f4; }
    .green { background: #5ccdad; }
    .orange { background: #f4a021; }
    .red { background: #df5831; }
    .pink { background: #d94b7b; }

    .tag-purple { background: var(--purple-soft); color: var(--purple); }
    .tag-green { background: var(--green-soft); color: var(--green); }
    .tag-orange { background: var(--amber-soft); color: var(--amber); }
    .tag-red { background: var(--red-soft); color: var(--red); }
    .tag-pink { background: var(--pink-soft); color: var(--pink); }

    @media (max-width: 1060px) {
      .dashboard,
      .workspace {
        grid-template-columns: 1fr;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .dashboard {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .subject-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 22px 14px 42px;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .header-actions {
        justify-content: flex-start;
      }

      h1 {
        font-size: 24px;
      }

      .dashboard {
        grid-template-columns: 1fr;
      }

      .appearance-panel {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .bg-editor {
        grid-template-columns: 1fr;
      }

      .modal-actions {
        flex-direction: column;
      }

      .stage {
        padding: 18px;
      }

      .stage-top {
        align-items: flex-start;
      }

      .stage-left {
        gap: 10px;
        flex-wrap: wrap;
      }

      .stage-name {
        font-size: 19px;
      }

      .date {
        font-size: 14px;
      }

      .subject-grid,
      .wrong-grid,
      .score-form,
      .score-fields,
      .major-types-row,
      .wrong-upload-actions,
      .wrong-upload-main-form,
      .wrong-preview,
      .focus-stat-grid,
      .mini-stats {
        grid-template-columns: 1fr;
      }

      .task-form {
        grid-template-columns: 1fr;
      }

      td:first-child,
      th:first-child {
        width: 40%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="title-wrap">
        <h1>考研复习全年计划</h1>
        <p class="subtitle">阶段计划、每日执行、专注记录、模考复盘</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn stage-toggle" title="展开或收起全部阶段" onclick="toggleAll()">•••</button>
        <button class="layout-btn" id="layoutToggleBtn" onclick="toggleLayoutEdit()">布局编辑</button>
        <button class="layout-btn layout-reset" onclick="resetModuleLayout()">重置布局</button>
        <button class="icon-btn" title="清空今日数据" onclick="clearToday()">↺</button>
      </div>
    </header>

    <section class="appearance-panel" aria-label="外观设置">
      <span class="appearance-title">主题配色</span>
      <div class="theme-options" id="themeOptions"></div>
      <label class="upload-btn" title="上传图片作为页面背景">
        上传背景
        <input type="file" id="bgUpload" accept="image/*" onchange="uploadBackground(event)" />
      </label>
      <button class="ghost-btn" onclick="openBackgroundEditor()">编辑背景</button>
      <button class="ghost-btn" onclick="clearBackground()">清除背景</button>
    </section>

    <section class="dashboard module-zone" data-zone-id="dashboard" data-zone-label="顶部看板" aria-label="复习看板">
      <article class="panel metric module-card" data-module-id="examCountdown">
        <div class="panel-title">考试倒计时</div>
        <div class="countdown">
          <span class="days" id="daysLeft">0</span>
          <span class="unit" id="daysUnit">天</span>
        </div>
        <div class="date-row">
          <input type="date" id="examDate" />
          <button class="primary-btn" onclick="saveExamDate()">保存</button>
        </div>
      </article>

      <article class="panel metric module-card" data-module-id="currentStage">
        <div class="panel-title">当前阶段</div>
        <div class="current-stage">
          <span class="stage-pill" id="currentStagePill"></span>
          <p class="stage-summary" id="currentStageSummary"></p>
        </div>
        <div class="mini-stats">
          <div class="mini-stat">
            <strong id="todayDone">0</strong>
            <span>今日完成</span>
          </div>
          <div class="mini-stat">
            <strong id="todayFocus">0</strong>
            <span>专注分钟</span>
          </div>
          <div class="mini-stat">
            <strong id="latestScore">--</strong>
            <span>最近模考</span>
          </div>
        </div>
      </article>
    </section>

    <section class="timeline" aria-label="全年复习时间轴">
      <div class="timeline-track">
        <div class="bar">
          <div class="seg"></div>
          <div class="seg"></div>
          <div class="seg"></div>
          <div class="seg"></div>
          <div class="seg"></div>
        </div>
        <div class="timeline-marker" id="timelineMarker">
          <div class="timeline-icon" id="timelineIcon">
            <span>✈</span>
            <img id="timelineIconImage" alt="时间轴进度图标" />
          </div>
          <span class="timeline-marker-label" id="timelineMarkerLabel">当前阶段</span>
        </div>
      </div>
      <div class="months">
        <span>3月</span>
        <span>5月</span>
        <span>7月</span>
        <span>9月</span>
        <span>11月</span>
        <span>12月</span>
      </div>
      <div class="timeline-actions">
        
        <label class="upload-btn" title="上传 SVG 矢量图替换时间轴小图标">
          上传进度图标
          <input type="file" accept=".svg,image/svg+xml" onchange="uploadTimelineIcon(event)" />
        </label>
        <button class="ghost-btn" onclick="clearTimelineIcon()">恢复小飞机</button>
      </div>
    </section>

    <section class="workspace">
      <section class="main-stack">
        <div class="main-grid module-zone" data-zone-id="mainGrid" data-zone-label="主功能区">
          <article class="panel module-card" data-module-id="dailyTasks">
            <div class="panel-title">
              <span>今日清单</span>
              <span id="taskPercent">0%</span>
            </div>
            <div class="progress-line"><span id="taskProgress"></span></div>
            <div class="task-form">
              <select id="taskSubject">
                <option>数学</option>
                <option>英语</option>
                <option>政治</option>
                <option>专业课</option>
              </select>
              <input id="taskInput" type="text" placeholder="新增任务" />
              <button class="primary-btn" onclick="addTask()">添加</button>
            </div>
            <div class="task-list" id="taskList"></div>
          </article>

          <article class="panel focus-panel module-card" data-module-id="focusTimer">
            <div class="panel-title">专注计时与统计</div>
            <div class="timer">
              <select class="timer-select" id="timerSubject" onchange="saveTimerSubject()">
                <option>数学</option>
                <option>英语</option>
                <option>政治</option>
                <option>专业课</option>
              </select>
              <div class="preset-row" id="presetRow"></div>
              <div class="custom-timer">
                <input type="number" id="customMinutes" min="1" max="300" placeholder="自定义分钟数" />
                <button class="ghost-btn" onclick="setCustomPreset()">设置时长</button>
              </div>
              <div class="timer-face">
                <span class="timer-time" id="timerTime">50:00</span>
                <button class="ghost-btn" onclick="finishFocus()">完成一轮</button>
              </div>
              <div class="timer-controls">
                <button class="primary-btn" id="startPauseBtn" onclick="toggleTimer()">开始</button>
                <button class="ghost-btn" onclick="resetTimer()">重置</button>
                <button class="ghost-btn" onclick="openFocusStatsModal()">专注情况</button>
              </div>
            </div>
          </article>
        </div>

        <div class="main-wide module-zone" data-zone-id="mainWide" data-zone-label="主内容区">
        <article class="panel module-card" data-module-id="wrongUpload">
          <div class="panel-title">添加错题</div>
          <div class="wrong-upload-form">
            <div class="wrong-upload-main-form">
              <select id="wrongUploadSubject">
                <option>数学</option>
                <option>英语</option>
                <option>政治</option>
                <option>专业课</option>
              </select>
              <input id="wrongUploadNote" type="text" placeholder="填写错因或题目关键词" />
            </div>
            <div class="wrong-upload-actions">
              <label class="file-btn" title="用手机后置摄像头拍照上传">
                拍照上传
                <input type="file" accept="image/*" capture="environment" onchange="selectWrongFiles(event)" />
              </label>
              <label class="file-btn secondary" title="从相册选择错题图片">
                相册上传
                <input type="file" accept="image/*" multiple onchange="selectWrongFiles(event)" />
              </label>
              <button class="primary-btn" onclick="confirmWrongUpload()">确认添加</button>
            </div>
            <div class="upload-hint" id="wrongUploadHint">先选择错题图片并填写错因，再点确认添加；添加后会自动计入今日错题数。</div>
            <div class="wrong-preview" id="wrongPreview"></div>
          </div>
        </article>

        <article class="panel module-card" data-module-id="wrongBank">
          <div class="panel-title">
            <span>错题库与 PDF</span>
            <span id="wrongSelectedCount">已选 0 题</span>
          </div>
          <div class="wrong-bank-actions">
            <button class="ghost-btn" onclick="selectAllWrongUploads()">全选</button>
            <button class="ghost-btn" onclick="clearWrongSelection()">清空选择</button>
            <button class="primary-btn" onclick="generateWrongPdf()">生成PDF</button>
          </div>
          <div class="wrong-upload-list" id="wrongUploadList"></div>
        </article>
        </div>

        <section class="stage-list" id="stageList" aria-label="阶段计划"></section>
      </section>

      <aside class="side-stack module-zone" data-zone-id="sideStack" data-zone-label="侧边栏">
        <article class="panel module-card" data-module-id="wrongStats">
          <div class="panel-title">
            <span>错题统计</span>
            <button class="ghost-btn" onclick="resetWrong()">清零</button>
          </div>
          <div class="wrong-grid" id="wrongGrid"></div>
        </article>

        <article class="panel module-card" data-module-id="mockScores">
          <div class="panel-title">模考记录</div>
          <div class="score-form">
            <input type="date" id="scoreDate" />
            <select id="scoreType" onchange="renderScoreFields()">
              <option>全科模拟</option>
              <option>数学套卷</option>
              <option>英语套卷</option>
              <option>政治套卷</option>
              <option>专业课套卷</option>
            </select>
            <div class="major-types-row full" id="majorTypesRow">
              <input type="text" id="majorScoreTypes" placeholder="专业课题型，如：名词解释、简答题、论述题" />
              <button class="ghost-btn" onclick="applyMajorScoreTypes()">应用题型</button>
            </div>
            <div class="score-fields full" id="scoreFields"></div>
            <button class="primary-btn full" onclick="saveScore()">保存记录</button>
          </div>
          <div class="score-list" id="scoreList"></div>
        </article>
      </aside>
    </section>
  </main>

  <div class="modal-backdrop" id="backgroundModal" onclick="handleBackgroundModalClick(event)">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="backgroundModalTitle">
      <div class="modal-head">
        <strong id="backgroundModalTitle">编辑背景</strong>
        <button class="icon-btn" title="关闭" onclick="closeBackgroundEditor()">×</button>
      </div>
      <div class="bg-editor" id="bgEditor">
        <label>
          背景不透明度 <span class="bg-value" id="bgOpacityValue">18%</span>
          <input type="range" id="bgOpacity" min="0" max="100" step="1" oninput="updateBackgroundSetting('opacity', this.value)" />
        </label>
        <label>
          裁切方式
          <select id="bgFit" onchange="updateBackgroundSetting('fit', this.value)">
            <option value="cover">填充裁切</option>
            <option value="contain">完整显示</option>
            <option value="custom">自定义缩放</option>
          </select>
        </label>
        <label>
          裁切缩放 <span class="bg-value" id="bgZoomValue">120%</span>
          <input type="range" id="bgZoom" min="80" max="220" step="5" oninput="updateBackgroundSetting('zoom', this.value)" />
        </label>
        <label>
          水平位置 <span class="bg-value" id="bgPosXValue">50%</span>
          <input type="range" id="bgPosX" min="0" max="100" step="1" oninput="updateBackgroundSetting('posX', this.value)" />
        </label>
        <label>
          垂直位置 <span class="bg-value" id="bgPosYValue">50%</span>
          <input type="range" id="bgPosY" min="0" max="100" step="1" oninput="updateBackgroundSetting('posY', this.value)" />
        </label>
      </div>
      <div class="modal-actions">
        <button class="ghost-btn" onclick="resetBackgroundEdits()">重置编辑</button>
        <button class="primary-btn" onclick="closeBackgroundEditor()">完成</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="focusStatsModal" onclick="handleFocusStatsModalClick(event)">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="focusStatsModalTitle">

        return Number.isFinite(number) ? Math.min(max, Math.max(min, number)) : fallback;
      };
      const opacity = clampNumber(settings.opacity, defaultBackgroundSettings.opacity, 0, 100);
      const zoom = clampNumber(settings.zoom, defaultBackgroundSettings.zoom, 80, 220);
      const posX = clampNumber(settings.posX, defaultBackgroundSettings.posX, 0, 100);
      const posY = clampNumber(settings.posY, defaultBackgroundSettings.posY, 0, 100);
      const fit = ["cover", "contain", "custom"].includes(settings.fit) ? settings.fit : "cover";
      const imageSize = fit === "custom" ? `${zoom}% auto` : fit;

      document.documentElement.style.setProperty("--bg-mask", (1 - opacity / 100).toFixed(2));
      document.documentElement.style.setProperty("--bg-size", imageSize);
      document.documentElement.style.setProperty("--bg-position-x", `${posX}%`);
      document.documentElement.style.setProperty("--bg-position-y", `${posY}%`);

    function openMediaDb() {
      if (mediaDbPromise) return mediaDbPromise;
      mediaDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open("kaoyan-media-store", 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains("media")) {
            db.createObjectStore("media", { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
      return mediaDbPromise;
    }

    async function putMedia(item) {
      const db = await openMediaDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("media", "readwrite");
        tx.objectStore("media").put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getMedia(id) {
      const db = await openMediaDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("media", "readonly");
        const request = tx.objectStore("media").get(id);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteMedia(id) {
      const db = await openMediaDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("media", "readwrite");
        tx.objectStore("media").delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function compressImageData(file, options = {}) {
      const maxSide = options.maxSide || 1200;
      const quality = options.quality || 0.78;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error("图片读取失败"));
          img.onload = () => {
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const width = Math.max(1, Math.round(img.width * scale));
            const height = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function uploadBackground(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      event.target.value = "";
      try {
        const imageData = await compressImageData(file, { maxSide: 1920, quality: 0.72 });
        await putMedia({
          id: "background",
          image: imageData,
          updatedAt: Date.now()
        });
        localStorage.removeItem(`${storePrefix}:background`);
        applyBackground(imageData);

      }

      }

        const legacyBackground = localStorage.getItem(`${storePrefix}:background`);
        if (legacyBackground) applyBackground(legacyBackground);
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

      if (wrongDbPromise) return wrongDbPromise;
      wrongDbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open("kaoyan-wrong-bank", 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains("items")) {
            const store = db.createObjectStore("items", { keyPath: "id" });
            store.createIndex("createdAt", "createdAt");
            store.createIndex("date", "date");
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
      return wrongDbPromise;
    }

    async function putWrongUpload(item) {
      const db = await openWrongDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("items", "readwrite");
        tx.objectStore("items").put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getWrongUploads() {
      const db = await openWrongDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("items", "readonly");
        const request = tx.objectStore("items").getAll();
        request.onsuccess = () => {
          const items = request.result || [];
          items.sort((a, b) => b.createdAt - a.createdAt);
          resolve(items);
        };
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteWrongUploadRecord(id) {
      const db = await openWrongDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("items", "readwrite");
        tx.objectStore("items").delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function markTodayWrongUploadsUncounted() {
      const uploads = await getWrongUploads();
      const todayUploads = uploads.filter(item => item.date === todayKey && item.counted);
      for (const item of todayUploads) {
        await putWrongUpload({ ...item, counted: false });
      }
    }

    function updateWrongCount(subject, delta, dateKey = todayKey) {
      const wrong = getStorage(`wrong:${dateKey}`, Object.fromEntries(subjects.map(item => [item, 0])));
      wrong[subject] = Math.max(0, (wrong[subject] || 0) + delta);
      setStorage(`wrong:${dateKey}`, wrong);
    }

    async function confirmWrongUpload() {
      const files = pendingWrongFiles;
      if (!files.length) {
        wrongUploadHint.textContent = "请先拍照或从相册选择错题图片。";
        return;
      }

      const subject = wrongUploadSubject.value;
      const note = wrongUploadNote.value.trim();
      if (!note) {
        wrongUploadHint.textContent = "请先填写错因或题目关键词，再确认添加。";
        return;
      }

      wrongUploadHint.textContent = `正在处理 ${files.length} 张图片...`;

      try {
        for (const file of files) {
          const image = await compressImageFile(file);
          const item = {
            id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            date: todayKey,
            subject,
            note,
            image,
            createdAt: Date.now(),
            counted: true
          };
          await putWrongUpload(item);
          updateWrongCount(subject, 1);
        }
        wrongUploadNote.value = "";
        pendingWrongFiles = [];
        clearWrongPreview();
        wrongUploadHint.textContent = `已上传 ${files.length} 张，并计入${subject}错题数。`;
        renderWrong();
        renderWrongUploads();

    function getStageByDate() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      if (month >= 3 && month <= 6) return 0;
      if (month >= 7 && month <= 9) return 1;
      if (month === 10 || (month === 11 && day < 15)) return 2;
      if ((month === 11 && day >= 15) || (month === 12 && day < 10)) return 3;
      if (month === 12) return 4;
      return 0;
    }

    function renderCountdown() {
      const savedDate = localStorage.getItem(`${storePrefix}:examDate`) || defaultExamDate;
      examDateInput.value = savedDate;
      const target = new Date(`${savedDate}T00:00:00`);
      const now = new Date();
      const diff = Math.ceil((target - now) / 86400000);
      document.getElementById("daysLeft").textContent = Math.max(diff, 0);
      document.getElementById("daysUnit").textContent = diff >= 0 ? "天" : "已结束";
      renderTimelineProgress();
    }

    function renderTimelineProgress() {
      const now = new Date();
      const examDateValue = localStorage.getItem(`${storePrefix}:examDate`) || defaultExamDate;
      const examDate = new Date(`${examDateValue}T00:00:00`);
      const start = new Date(now.getFullYear(), 2, 1);
      const end = examDate > start ? examDate : new Date(now.getFullYear(), 11, 31);
      const rawProgress = (now - start) / (end - start);
      const progress = Math.min(1, Math.max(0, rawProgress));
      const percent = Math.round(progress * 1000) / 10;
      const stage = stages[dateStageIndex];
      const daysToExam = Math.ceil((examDate - now) / 86400000);

      timelineMarker.style.left = `${percent}%`;
      timelineMarkerLabel.textContent = stage ? stage.name : "当前进度";
      //timelineProgressText.textContent = `当前 ${percent}% · ${stage ? stage.name : "复习中"} · 距考试 ${Math.max(0, daysToExam)} 天`;
    }

      wrong[subject] = (wrong[subject] || 0) + 1;
      setStorage(`wrong:${todayKey}`, wrong);

    async function resetWrong() {
      if (!confirm("确定要清零今日错题统计吗？已上传的错题图片会保留，但今日计数会清空。")) return;
      setStorage(`wrong:${todayKey}`, Object.fromEntries(subjects.map(subject => [subject, 0])));
      renderWrong();
      try {
        await markTodayWrongUploadsUncounted();
        renderWrongUploads();
      } catch (error) {
        wrongUploadHint.textContent = "错题数已清零，上传记录状态同步失败。";
      }
    }

    function renderPresets() {
      presetRow.innerHTML = timerPresets.map(preset => `
        <button class="preset-btn ${preset.minutes === activePreset ? "active" : ""}" onclick="setPreset(${preset.minutes})">${preset.label}分钟</button>
      `).join("");
      customMinutes.value = timerPresets.some(preset => preset.minutes === activePreset) ? "" : activePreset;
    }

    function setPreset(minutes) {
      setTimerDuration(minutes);
    }

    function setCustomPreset() {
      const minutes = Math.round(Number(customMinutes.value));
      if (!Number.isFinite(minutes) || minutes < 1) return;
      setTimerDuration(Math.min(minutes, 300));
    }

    function setTimerDuration(minutes) {
      activePreset = minutes;
      localStorage.setItem(`${storePrefix}:timerPreset`, activePreset);
      timerRunning = false;
      clearInterval(timerHandle);
      timerSeconds = activePreset * 60;
      focusStartedSeconds = timerSeconds;
      focusSessionStartAt = null;
      startPauseBtn.textContent = "开始";
      renderPresets();
      renderTimer();
    }

    function renderTimer() {
      const minutes = Math.floor(timerSeconds / 60).toString().padStart(2, "0");
      const seconds = (timerSeconds % 60).toString().padStart(2, "0");
      timerTime.textContent = `${minutes}:${seconds}`;
    }

    function toggleTimer() {
      timerRunning = !timerRunning;
      startPauseBtn.textContent = timerRunning ? "暂停" : "开始";
      clearInterval(timerHandle);
      if (!timerRunning) return;
      if (!focusSessionStartAt) focusSessionStartAt = Date.now();
      timerHandle = setInterval(() => {
        timerSeconds -= 1;
        if (timerSeconds <= 0) {
          finishFocus();
          return;
        }
        renderTimer();
      }, 1000);
    }

    function resetTimer() {
      timerRunning = false;
      clearInterval(timerHandle);
      timerSeconds = activePreset * 60;
      focusStartedSeconds = timerSeconds;
      focusSessionStartAt = null;
      startPauseBtn.textContent = "开始";
      renderTimer();
    }

    function finishFocus() {
      const elapsed = Math.round((focusStartedSeconds - timerSeconds) / 60);
      const spent = elapsed > 0 ? elapsed : activePreset;
      const focus = getStorage(`focus:${todayKey}`, Object.fromEntries(subjects.map(subject => [subject, 0])));
      focus[timerSubject.value] = (focus[timerSubject.value] || 0) + spent;
      setStorage(`focus:${todayKey}`, focus);
      addFocusSession(timerSubject.value, spent);
      resetTimer();
      renderStats();
      renderFocusStats();
    }

    function addFocusSession(subject, minutes) {
      const now = Date.now();
      const sessions = getStorage("focusSessions", []);
      sessions.unshift({
        id: `${now}-${Math.random().toString(16).slice(2)}`,
        date: todayKey,
        subject,
        minutes,
        startedAt: focusSessionStartAt || now - minutes * 60000,
        endedAt: now
      });
      setStorage("focusSessions", sessions.slice(0, 300));
    }

    function getRecentDateKeys(days) {
      return Array.from({ length: days }, (_, index) => {
        const date = new Date();
        date.setDate(date.getDate() - index);
        return formatLocalDate(date);
      });
    }

    function renderFocusStats() {
      const sessions = getStorage("focusSessions", []);
      const weekKeys = new Set(getRecentDateKeys(7));
      const todaySessions = sessions.filter(item => item.date === todayKey);
      const weekSessions = sessions.filter(item => weekKeys.has(item.date));
      const todayTotal = todaySessions.reduce((sum, item) => sum + Number(item.minutes || 0), 0);
      const weekTotal = weekSessions.reduce((sum, item) => sum + Number(item.minutes || 0), 0);
      const subjectTotals = Object.fromEntries(subjects.map(subject => [subject, 0]));

      todaySessions.forEach(item => {
        subjectTotals[item.subject] = (subjectTotals[item.subject] || 0) + Number(item.minutes || 0);
      });

      document.getElementById("focusTodayTotal").textContent = todayTotal;
      document.getElementById("focusWeekTotal").textContent = weekTotal;
      document.getElementById("focusSessionCount").textContent = todaySessions.length;

      renderFocusWeekChart(weekSessions);

      const maxSubject = Math.max(1, ...Object.values(subjectTotals));
      focusSubjectStats.innerHTML = subjects.map(subject => {
        const value = subjectTotals[subject] || 0;
        return `
          <div class="focus-subject-row">
            <span>${subject}</span>
            <div class="focus-bar"><span style="width: ${Math.round(value / maxSubject * 100)}%"></span></div>
            <span>${value}分</span>
          </div>
        `;
      }).join("");

      if (!sessions.length) {
        focusSessionList.innerHTML = `<div class="empty">暂无专注记录</div>`;
        return;
      }

      focusSessionList.innerHTML = sessions.slice(0, 12).map(item => `
        <div class="focus-session-item">
          <div class="focus-session-main">
            <strong>${escapeHtml(item.subject)} · ${Number(item.minutes || 0)}分钟</strong>
            <span>${escapeHtml(item.date)} ${formatTime(item.endedAt)}</span>
          </div>
          <button class="small-delete" type="button" title="删除记录" onclick="deleteFocusSession('${item.id}')">×</button>
        </div>
      `).join("");
    }

    function renderFocusWeekChart(weekSessions) {
      const keys = getRecentDateKeys(7).reverse();
      const totals = Object.fromEntries(keys.map(key => [key, 0]));
      weekSessions.forEach(item => {
        if (totals[item.date] !== undefined) {
          totals[item.date] += Number(item.minutes || 0);
        }
      });

      const values = keys.map(key => totals[key]);
      const maxValue = Math.max(1, ...values);
      const hasData = values.some(value => value > 0);

      if (!hasData) {
        focusWeekChart.innerHTML = `<div class="focus-chart-empty">完成一轮专注后生成趋势图</div>`;
        return;
      }

      const width = 560;
      const height = 180;
      const chartTop = 14;
      const chartBottom = 36;
      const chartHeight = height - chartTop - chartBottom;
      const gap = 16;
      const barWidth = (width - gap * (keys.length + 1)) / keys.length;
      const gridLines = [0.25, 0.5, 0.75, 1];
      const bars = keys.map((key, index) => {
        const value = totals[key];
        const barHeight = Math.max(value ? 4 : 0, value / maxValue * chartHeight);
        const x = gap + index * (barWidth + gap);
        const y = chartTop + chartHeight - barHeight;
        const label = key.slice(5).replace("-", "/");
        return `
          <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="5" fill="var(--blue)"></rect>
          <text x="${x + barWidth / 2}" y="${height - 16}" text-anchor="middle" fill="#64748b" font-size="12">${label}</text>
          <text x="${x + barWidth / 2}" y="${Math.max(12, y - 6)}" text-anchor="middle" fill="#334155" font-size="12" font-weight="700">${value}</text>
        `;
      }).join("");

      const grids = gridLines.map(line => {
        const y = chartTop + chartHeight - chartHeight * line;
        return `<line x1="8" y1="${y}" x2="${width - 8}" y2="${y}" stroke="#e2e8f0" stroke-dasharray="4 5"></line>`;
      }).join("");

      focusWeekChart.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="近7天专注时长柱状图">
          ${grids}
          ${bars}
        </svg>
      `;
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      const date = new Date(timestamp);
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function deleteFocusSession(id) {
      const sessions = getStorage("focusSessions", []);
      const target = sessions.find(item => item.id === id);
      setStorage("focusSessions", sessions.filter(item => item.id !== id));
      if (target && target.date === todayKey) {
        const focus = getStorage(`focus:${todayKey}`, Object.fromEntries(subjects.map(subject => [subject, 0])));
        focus[target.subject] = Math.max(0, (focus[target.subject] || 0) - Number(target.minutes || 0));
        setStorage(`focus:${todayKey}`, focus);
      }
      renderFocusStats();
      renderStats();
    }

    function removeTodayFocusSessions() {
      const sessions = getStorage("focusSessions", []);
      setStorage("focusSessions", sessions.filter(item => item.date !== todayKey));
      renderFocusStats();
    }

    function initModuleDragging() {
      document.querySelectorAll(".module-card").forEach(module => {
        const title = module.querySelector(".panel-title");
        if (title && !title.querySelector(".module-handle")) {
          const handle = document.createElement("button");
          handle.type = "button";
          handle.className = "module-handle";
          handle.draggable = false;
          handle.title = "拖动模块";
          handle.textContent = "↕";
          title.insertBefore(handle, title.firstChild);

          handle.addEventListener("dragstart", event => {
            if (!document.body.classList.contains("layout-editing")) {
              event.preventDefault();
              return;
            }
            module.classList.add("dragging");
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", module.dataset.moduleId);
          });

          handle.addEventListener("dragend", () => {
            module.classList.remove("dragging");
            document.querySelectorAll(".module-zone").forEach(zone => zone.classList.remove("drag-over"));
            saveModuleLayout();
          });
        }
      });

      document.querySelectorAll(".module-zone").forEach(zone => {
        if (zone.dataset.dragReady === "1") return;
        zone.dataset.dragReady = "1";

        zone.addEventListener("dragover", event => {
          event.preventDefault();
          event.stopPropagation();
          if (!document.body.classList.contains("layout-editing")) return;
          const dragging = document.querySelector(".module-card.dragging");
          if (!dragging) return;
          zone.classList.add("drag-over");
          const afterElement = getDragAfterElement(zone, event.clientX, event.clientY);
          if (afterElement) {
            zone.insertBefore(dragging, afterElement);
          } else {
            zone.appendChild(dragging);
          }
        });

        zone.addEventListener("dragleave", event => {
          if (!zone.contains(event.relatedTarget)) zone.classList.remove("drag-over");
        });

        zone.addEventListener("drop", event => {
          event.preventDefault();
          event.stopPropagation();
          if (!document.body.classList.contains("layout-editing")) return;
          zone.classList.remove("drag-over");
          saveModuleLayout();
        });
      });
    }

    function getDragAfterElement(container, x, y) {
      const elements = [...container.children].filter(child =>
        child.classList && child.classList.contains("module-card") && !child.classList.contains("dragging")
      ).sort((a, b) => {
        const boxA = a.getBoundingClientRect();
        const boxB = b.getBoundingClientRect();
        if (Math.abs(boxA.top - boxB.top) > 8) return boxA.top - boxB.top;
        return boxA.left - boxB.left;
      });

      if (!elements.length) return null;

      const closest = elements.reduce((best, child) => {
        const box = child.getBoundingClientRect();
        const centerX = box.left + box.width / 2;
        const centerY = box.top + box.height / 2;
        const distance = Math.hypot(x - centerX, y - centerY);
        if (distance < best.distance) {
          return { distance, element: child };
        }
        return best;
      }, { distance: Number.POSITIVE_INFINITY, element: null }).element;

      if (!closest) return null;
      const box = closest.getBoundingClientRect();
      const centerX = box.left + box.width / 2;
      const centerY = box.top + box.height / 2;
      const sameRow = y >= box.top && y <= box.bottom;
      const shouldInsertBefore = sameRow ? x < centerX : y < centerY;
      if (shouldInsertBefore) return closest;

      const index = elements.indexOf(closest);
      return elements[index + 1] || null;
    }

    function saveModuleLayout() {
      const layout = {};
      document.querySelectorAll(".module-zone").forEach(zone => {
        layout[zone.dataset.zoneId] = [...zone.children]
          .filter(child => child.classList && child.classList.contains("module-card"))
          .map(child => child.dataset.moduleId);
      });
      setStorage("moduleLayout", layout);
    }

    function restoreModuleLayout() {
      const layout = getStorage("moduleLayout", null);
      applyModuleLayout(layout || defaultModuleLayout);
    }

    function normalizeModuleLayout(layout) {
      const nextLayout = { ...layout };
      if (nextLayout.mainStack && !nextLayout.mainWide) {
        nextLayout.mainWide = nextLayout.mainStack;
        delete nextLayout.mainStack;
      }
      return nextLayout;
    }

    function applyModuleLayout(layout) {
      const normalized = normalizeModuleLayout(layout || defaultModuleLayout);
      const modules = Object.fromEntries([...document.querySelectorAll(".module-card")].map(module => [module.dataset.moduleId, module]));
      Object.entries(normalized).forEach(([zoneId, moduleIds]) => {
        const zone = document.querySelector(`.module-zone[data-zone-id="${zoneId}"]`);
        if (!zone || !Array.isArray(moduleIds)) return;
        moduleIds.forEach(moduleId => {
          if (modules[moduleId]) zone.appendChild(modules[moduleId]);
        });
      });

      Object.entries(modules).forEach(([moduleId, module]) => {
        if (module.parentElement && module.parentElement.classList.contains("module-zone")) return;
        const fallbackZoneId = Object.entries(defaultModuleLayout).find(([, ids]) => ids.includes(moduleId))?.[0] || "mainWide";
        document.querySelector(`.module-zone[data-zone-id="${fallbackZoneId}"]`)?.appendChild(module);
      });
    }

    function toggleLayoutEdit() {
      setLayoutEditMode(!document.body.classList.contains("layout-editing"));
    }

    function setLayoutEditMode(enabled) {
      document.body.classList.toggle("layout-editing", enabled);
      layoutToggleBtn.textContent = enabled ? "完成布局" : "布局编辑";
      document.querySelectorAll(".module-handle").forEach(handle => {
        handle.draggable = enabled;
      });
      if (!enabled) {
        document.querySelectorAll(".module-zone").forEach(zone => zone.classList.remove("drag-over"));
        saveModuleLayout();
      }
    }

    function resetModuleLayout() {
      applyModuleLayout(defaultModuleLayout);
      localStorage.removeItem(`${storePrefix}:moduleLayout`);
      saveModuleLayout();
    }

    function saveTimerSubject() {
      localStorage.setItem(`${storePrefix}:timerSubject`, timerSubject.value);
    }

    function getMajorScoreTypes() {
      const saved = localStorage.getItem(`${storePrefix}:majorScoreTypes`);
      const raw = saved || scoreTemplates["专业课套卷"].join("、");
      const fields = raw
        .split(/[、,，\n]/)
        .map(item => item.trim())
        .filter(Boolean);
      return fields.length ? fields : scoreTemplates["专业课套卷"];
    }

    function getScoreLabels(type) {
      return type === "专业课套卷" ? getMajorScoreTypes() : (scoreTemplates[type] || scoreTemplates["全科模拟"]);
    }

    function renderScoreFields() {
      const type = scoreType.value;
      const labels = getScoreLabels(type);
      majorTypesRow.classList.toggle("active", type === "专业课套卷");
      majorScoreTypes.value = getMajorScoreTypes().join("、");
      scoreFields.innerHTML = labels.map((label, index) => `
        <input
          type="number"
          class="score-field"
          min="0"
          id="scoreField${index}"
          data-label="${escapeHtml(label)}"
          placeholder="${escapeHtml(label)}"
        />
      `).join("");
    }

    function applyMajorScoreTypes() {
      const fields = majorScoreTypes.value
        .split(/[、,，\n]/)
        .map(item => item.trim())
        .filter(Boolean);
      if (!fields.length) return;
      localStorage.setItem(`${storePrefix}:majorScoreTypes`, fields.join("、"));
      renderScoreFields();
    }

    function saveScore() {
      const fields = [...document.querySelectorAll(".score-field")];
      const breakdown = fields.map(field => ({
        label: field.dataset.label,
        score: Number(field.value || 0)
      }));
      const record = {
        id: `${Date.now()}`,
        date: document.getElementById("scoreDate").value || todayKey,
        type: scoreType.value,
        breakdown
      };
      record.total = breakdown.reduce((sum, item) => sum + item.score, 0);
      const scores = getStorage("scores", []);
      scores.unshift(record);
      setStorage("scores", scores.slice(0, 20));
      renderScoreFields();
      renderScores();
      renderStats();
    }

    function deleteScore(id) {
      setStorage("scores", getStorage("scores", []).filter(score => score.id !== id));
      renderScores();
      renderStats();
    }

    function renderScores() {
      const scores = getStorage("scores", []);
      if (!scores.length) {
        scoreList.innerHTML = `<div class="empty">暂无记录</div>`;
        return;
      }
      scoreList.innerHTML = scores.map(score => `
        <div class="score-item">
          <div class="score-main">
            <span>${escapeHtml(score.date)} · ${escapeHtml(score.type)}</span>
            <span>${Number(score.total || 0)}分</span>
          </div>
          <div class="score-meta">
            ${getScoreBreakdownText(score)}
          </div>
          <button class="danger-btn" onclick="deleteScore('${score.id}')">删除</button>
        </div>
      `).join("");
    }

    function getScoreBreakdownText(score) {
      if (Array.isArray(score.breakdown)) {
        return score.breakdown
          .map(item => `${escapeHtml(item.label)}${Number(item.score || 0)}`)
          .join(" / ");
      }
      return `数学${Number(score.math || 0)} / 英语${Number(score.english || 0)} / 政治${Number(score.politics || 0)} / 专业课${Number(score.major || 0)}`;
    }

    function renderStats() {
      const tasks = getTasks();
      const done = tasks.filter(task => task.done).length;
      const focus = getStorage(`focus:${todayKey}`, {});
      const focusTotal = Object.values(focus).reduce((sum, value) => sum + Number(value || 0), 0);
      const scores = getStorage("scores", []);
      document.getElementById("todayDone").textContent = done;
      document.getElementById("todayFocus").textContent = focusTotal;
      document.getElementById("latestScore").textContent = scores[0] ? scores[0].total : "--";
    }

    async function clearToday() {
      localStorage.removeItem(`${storePrefix}:${taskKey()}`);
      localStorage.removeItem(`${storePrefix}:wrong:${todayKey}`);
      localStorage.removeItem(`${storePrefix}:focus:${todayKey}`);
      ensureDailyTasks();
      renderTasks();
      renderWrong();
      removeTodayFocusSessions();
      renderStats();
      try {
        await markTodayWrongUploadsUncounted();
        renderWrongUploads();
      } catch (error) {
        wrongUploadHint.textContent = "今日数据已清空，上传记录状态同步失败。";
      }
    }

    function init() {
      const savedSubject = localStorage.getItem(`${storePrefix}:timerSubject`);
      if (savedSubject) timerSubject.value = savedSubject;
      document.body.dataset.theme = localStorage.getItem(`${storePrefix}:theme`) || "default";
      applyBackgroundSettings();
      loadSavedBackground();
      document.getElementById("scoreDate").value = todayKey;
      restoreModuleLayout();
      initModuleDragging();
      renderThemeOptions();
      renderCountdown();
      loadTimelineIcon();
      renderStages();
      ensureDailyTasks();
      renderTasks();
      renderWrong();
      renderPresets();
      renderTimer();
      renderScoreFields();
      renderScores();
      renderWrongUploads();
      renderFocusStats();
      renderStats();
    }

    taskInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addTask();
    });

    customMinutes.addEventListener("keydown", event => {
      if (event.key === "Enter") setCustomPreset();
    });

    majorScoreTypes.addEventListener("keydown", event => {
      if (event.key === "Enter") applyMajorScoreTypes();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeBackgroundEditor();
        closeFocusStatsModal();
      }
    });

    init();
  </script>
</body>
